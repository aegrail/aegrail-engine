name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version from tag
        id: vars
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          # tag is like 'v0.1.0' — strip the leading 'v' for image tags
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ steps.vars.outputs.version }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/aegrail-engine:${{ steps.vars.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/aegrail-engine:${{ steps.vars.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/aegrail-engine:latest
          labels: |
            org.opencontainers.image.title=aegrail-engine
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.vars.outputs.version }}
            org.opencontainers.image.licenses=Apache-2.0
