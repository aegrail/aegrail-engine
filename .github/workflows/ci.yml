name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ["1.22", "1.23"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true
      - name: Verify go.mod tidy
        run: |
          go mod tidy
          # go.sum only exists when the module has external deps. The
          # placeholder build is stdlib-only, so go.sum may be absent —
          # check each file independently.
          if ! git diff --quiet go.mod 2>/dev/null; then
            echo "go.mod out of date"
            git diff go.mod
            exit 1
          fi
          if [ -f go.sum ] && ! git diff --quiet go.sum 2>/dev/null; then
            echo "go.sum out of date"
            git diff go.sum
            exit 1
          fi
      - name: Build
        run: go build ./...
      - name: Test
        run: go test -race -count=1 ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: latest
      - name: Lint Helm chart
        run: |
          if [ -f deploy/helm/Chart.yaml ]; then
            helm lint deploy/helm/
          else
            echo "Helm chart not yet present; skipping"
          fi
