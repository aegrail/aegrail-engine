# Default values for aegrail-engine.
# YAML format. Override on the `helm install` / `helm upgrade` command
# line, with --set, or with --values <file>.

# -- override the chart's name in resource naming (rarely needed)
nameOverride: ""

# -- override the full resource name (rarely needed)
fullnameOverride: ""

# Container image. By default tag is empty, which makes the chart use
# Chart.yaml's appVersion. Override .image.tag for a specific version
# or for local development.
image:
  repository: ghcr.io/aegrail/aegrail-engine
  tag: ""  # defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent

# -- imagePullSecrets for private registries
imagePullSecrets: []

# Number of engine pods. For cluster-shared deployment (the v0.1.0
# default), >1 lets the engine ride out node failures. For pure
# sidecar deployment (one engine per agent pod) you'd usually pin
# this to 1 per agent pod via your own deployment, not via this chart.
replicaCount: 1

# HTTP forward proxy port the engine listens on inside its container.
# Agent containers point HTTP_PROXY / HTTPS_PROXY env vars at the
# Service's DNS name on this port.
proxy:
  listenPort: 8080

# Identity stamped on every audit event the engine emits. Stable
# string — your audit chain joins on it.
agentIdentity: "egress-proxy/v1"

# Optional: bind agent_identity to a pod label via the K8s downward
# API. When set, the engine reads its identity from the named pod
# label at startup and the static `agentIdentity` above is ignored.
#
# This is the foundation for the v0.2.0 sidecar auto-injection
# webhook — the webhook will stamp the label on the agent's pod,
# and every audit event the sidecar emits carries the agent's
# identity without anyone editing the engine config.
#
# Example: agentIdentityFromLabel: "aegrail.io/identity"
agentIdentityFromLabel: ""

# Egress allowlist policy. Deny-by-default; only listed destinations
# are permitted at v0.1.0+. Empty list = deny all.
# Wildcards (e.g. *.openai.com) supported via fnmatch in the engine.
policy:
  allowlist: []
  # Examples:
  #   - api.openai.com
  #   - api.anthropic.com
  #   - "*.openai.com"

# Network-layer request budgets (v0.1.2+). These cap the engine's
# behavior without requiring body inspection — useful when the agent
# itself never imported the aegrail SDK and the platform team wants
# hard cost guardrails anyway.
limits:
  # Hard cap on total requests served over the engine's process
  # lifetime. 0 = unlimited. Denials emit egress_denied with
  # reason=request_count_exceeded and HTTP 429.
  maxRequests: 0
  # Token-bucket rate limit. Empty = unlimited. Format: "<n>/<unit>"
  # where unit is sec|min|hour. Burst equals n. Denials emit
  # egress_denied with reason=rate_limited and HTTP 429.
  # Example: "10/sec", "1000/min"
  rate: ""
  # Hard cap on cumulative LLM tokens (input + output) parsed from
  # known LLM response shapes (v0.3.0+). 0 = unlimited. Once the
  # running total crosses this value, the next request is denied
  # with reason=token_budget_exceeded and HTTP 429. The current
  # in-flight call always finishes accounting — we never lose
  # already-consumed work. Note: HTTPS CONNECT tunnels are opaque
  # to the parser unless MITM is enabled (see `mitm` below); token
  # enforcement otherwise only fires on plain-HTTP forwards.
  maxTokens: 0

# TLS MITM mode (v0.4.0+). When `mitm.hosts` is non-empty, the engine
# terminates TLS for CONNECT requests whose target matches one of
# the patterns, decrypts the traffic, parses for tokens, and
# re-encrypts to the real upstream — the only way to get token
# accounting on direct HTTPS traffic to public providers.
#
# **Operator responsibility:** the engine's CA must be trusted by
# the agent container. Without that, TLS handshake fails client-
# side. Distribution patterns:
#
#   - Mount the CA into the agent container at a known path
#   - Set REQUESTS_CA_BUNDLE, SSL_CERT_FILE, NODE_EXTRA_CA_CERTS
#     env vars on the agent container pointing at that path
#
# In v0.4.0 the operator does this distribution manually. The v0.4.1
# webhook will auto-inject the CA + env vars on labeled namespaces.
#
# CA strategy:
#   - Leave `caCertSecret` / `caKeySecret` empty → engine generates
#     a fresh CA at startup, logs the PEM (look at the engine pod's
#     logs to retrieve it). Fine for dev / kind.
#   - Set both to a Secret containing tls.crt + tls.key → engine
#     loads the pinned CA. Stable across restarts; required for
#     production where you don't want to redistribute trust on
#     every engine reroll.
mitm:
  # Comma-separated host patterns. Empty = MITM disabled. Same
  # fnmatch semantics as the egress allowlist.
  # Example: "api.openai.com,api.anthropic.com,*.bedrock-runtime.*.amazonaws.com"
  hosts: ""
  # Name of a Kubernetes TLS secret holding the persistent CA.
  # Optional; leave empty to auto-generate. The secret must have
  # tls.crt and tls.key keys.
  #
  # NOTE for v0.4.1+ webhook trust injection: the Secret must exist
  # **in each labeled namespace** where aegrail.io/inject=enabled,
  # because K8s does not allow cross-namespace Secret mounts.
  # Operators typically:
  #   1. Helm install pre-creates the Secret in the engine's
  #      namespace.
  #   2. A post-install Job or kubectl one-liner copies it to each
  #      target namespace.
  # The webhook does NOT create cross-namespace Secrets — that's a
  # controller's job (planned for v0.5.0).
  caSecretName: ""

# Audit log mode. v0.1.0 will write JSONL with a SHA-256 chain link
# per event, compatible with the aegrail Python library's format.
audit:
  mode: stdout  # one of: stdout, file
  filePath: /var/log/aegrail/audit.jsonl

# Service exposing the proxy port to other pods in the cluster.
service:
  type: ClusterIP
  port: 8080

# Resource budgets — intentionally tight; the engine is a small Go binary.
resources:
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 32Mi

# ServiceAccount the engine pod runs as.
serviceAccount:
  create: true
  name: ""           # if blank, uses the resource fullname
  annotations: {}

# Pod-level security context (applied to the pod spec)
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532   # distroless nonroot

# Container-level security context (applied to the engine container)
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Mutating admission webhook (v0.2.0+). When enabled, deploys an
# admission controller that auto-injects the engine sidecar into
# every pod created in namespaces labeled `aegrail.io/inject=enabled`.
# Agent developers get protection without touching their Dockerfile
# or code; platform teams enable it per namespace.
#
# Set webhook.enabled=true to turn on. Default off so existing
# v0.1.x deployments are unaffected.
webhook:
  enabled: false
  # Listen port inside the webhook container (TLS). 8443 is
  # conventional for K8s admission webhooks.
  listenPort: 8443
  # failurePolicy on the MutatingWebhookConfiguration. "Ignore"
  # fails open: an outage of the webhook does NOT block pod
  # creation cluster-wide. The engine itself still fails closed at
  # the proxy layer once injected (deny-by-default allowlist).
  failurePolicy: Ignore
  # Default value stamped on aegrail.io/identity for pods that
  # don't already have the label set.
  # K8s label values cannot contain '/', so use dash-separated
  # version segments (e.g. "support-bot-v1", "research-agent.v2.1").
  defaultIdentity: "auto-injected-v1"
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits:   { cpu: 200m, memory: 128Mi }

# Legacy/manual sidecar injection mode. Kept for v0.1.x deployments
# that don't use the webhook.
injection:
  mode: manual
