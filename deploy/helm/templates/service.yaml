apiVersion: v1
kind: Service
metadata:
  name: {{ include "aegrail-engine.fullname" . }}
  labels:
    {{- include "aegrail-engine.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "aegrail-engine.selectorLabels" . | nindent 4 }}
  ports:
    - name: proxy
      port: {{ .Values.service.port }}
      targetPort: proxy
      protocol: TCP
