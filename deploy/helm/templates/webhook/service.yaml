{{- if .Values.webhook.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "aegrail-engine.fullname" . }}-webhook
  labels:
    {{- include "aegrail-engine.labels" . | nindent 4 }}
    app.kubernetes.io/component: webhook
spec:
  type: ClusterIP
  selector:
    {{- include "aegrail-engine.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: webhook
  ports:
    - name: https
      port: 443
      targetPort: https
      protocol: TCP
{{- end -}}
