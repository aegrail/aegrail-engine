{{- if .Values.webhook.enabled -}}
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: {{ include "aegrail-engine.fullname" . }}-injector
  labels:
    {{- include "aegrail-engine.labels" . | nindent 4 }}
webhooks:
  - name: pods.aegrail.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: {{ .Values.webhook.failurePolicy }}
    namespaceSelector:
      matchLabels:
        aegrail.io/inject: enabled
    rules:
      - operations: ["CREATE"]
        apiGroups: [""]
        apiVersions: ["v1"]
        resources: ["pods"]
    clientConfig:
      service:
        name: {{ include "aegrail-engine.fullname" . }}-webhook
        namespace: {{ .Release.Namespace }}
        path: /mutate
        port: 443
      caBundle: {{ .Values.webhook._caBundle }}
{{- end -}}
