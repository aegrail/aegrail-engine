apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "aegrail-engine.fullname" . }}-policy
  labels:
    {{- include "aegrail-engine.labels" . | nindent 4 }}
data:
  # Engine reads these via AEGRAIL_ENGINE_* env vars (envFrom in the
  # Deployment). The same image is configured the same way on
  # Kubernetes (here), Cloud Run, Azure Container Apps, App Runner,
  # or Fargate — only the secret store side differs.
  AEGRAIL_ENGINE_ALLOWLIST: {{ join "," .Values.policy.allowlist | quote }}
  AEGRAIL_ENGINE_AGENT_IDENTITY: {{ .Values.agentIdentity | default "egress-proxy/v1" | quote }}
  {{- if eq .Values.audit.mode "stdout" }}
  AEGRAIL_ENGINE_AUDIT_STDOUT: "1"
  {{- else if eq .Values.audit.mode "file" }}
  AEGRAIL_ENGINE_AUDIT_FILE: {{ .Values.audit.filePath | quote }}
  {{- end }}
  AEGRAIL_ENGINE_LISTEN: {{ printf ":%d" (int .Values.proxy.listenPort) | quote }}
  {{- if .Values.limits }}
  {{- if .Values.limits.maxRequests }}
  AEGRAIL_ENGINE_MAX_REQUESTS: {{ .Values.limits.maxRequests | quote }}
  {{- end }}
  {{- if .Values.limits.rate }}
  AEGRAIL_ENGINE_RATE_LIMIT: {{ .Values.limits.rate | quote }}
  {{- end }}
  {{- if .Values.limits.maxTokens }}
  AEGRAIL_ENGINE_MAX_TOKENS: {{ .Values.limits.maxTokens | quote }}
  {{- end }}
  {{- end }}
  {{- if .Values.mitm }}
  {{- if .Values.mitm.hosts }}
  AEGRAIL_ENGINE_MITM_HOSTS: {{ .Values.mitm.hosts | quote }}
  {{- end }}
  {{- if .Values.mitm.caSecretName }}
  AEGRAIL_ENGINE_MITM_CA_CERT_FILE: "/etc/aegrail/mitm-ca/tls.crt"
  AEGRAIL_ENGINE_MITM_CA_KEY_FILE: "/etc/aegrail/mitm-ca/tls.key"
  {{- end }}
  {{- end }}
